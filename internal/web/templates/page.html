{{define "layout"}}
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ .Title }}</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <div class="page">
    <header>
      <div class="brand"><a href="/">Forum Go</a></div>
      <nav>
        {{ if .User }}
          <span>Bonjour {{ .User.Username }}</span>
          <a href="/post/new">Nouveau sujet</a>
          <a href="/logout">Déconnexion</a>
        {{ else }}
          <a href="/login">Connexion</a>
          <a href="/register">Inscription</a>
        {{ end }}
      </nav>
    </header>
    <main>
      {{ block "content" . }}{{ end }}
    </main>
  </div>
</body>
</html>
{{ end }}
