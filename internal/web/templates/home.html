{{define "content"}}
  <section class="filter">
    <form>
      <label>Filtrer par catégorie</label>
      <select name="category" onchange="this.form.submit()">
        <option value="">Toutes</option>
        {{ range .Categories }}
          <option value="{{ . }}" {{ if eq . $.Category }}selected{{ end }}>{{ . }}</option>
        {{ end }}
      </select>
    </form>
  </section>
  <section class="posts">
    {{ if .Posts }}
      {{ range .Posts }}
        <article class="post-preview">
          <a class="post-title" href="/post/{{ .ID }}">{{ .Title }}</a>
          <div class="meta">Auteur : {{ .Author }} • Catégorie : {{ .Category }} • Score : {{ .Score }}</div>
          <p>{{ .Content }}</p>
        </article>
      {{ end }}
    {{ else }}
      <p>Aucun sujet pour l’instant.</p>
    {{ end }}
  </section>
{{ end }}
